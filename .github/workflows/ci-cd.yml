name: Advanced DevOps CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install flake8
      - run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pip install -r requirements.txt
      - run: pytest

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit
      - run: bandit -r .

  dependency-check:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - run: pip install safety
      - run: safety check

  build:
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mirzahania/my-app:${{ github.sha }} .

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          docker tag mirzahania/my-app:${{ github.sha }} mirzahania/my-app:latest
          docker push mirzahania/my-app:${{ github.sha }}
          docker push mirzahania/my-app:latest

  image-scan:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: mirzahania/my-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull mirzahania/my-app:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 5000:5000 --restart always --name my-app mirzahania/my-app:latest

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check Application Health
        run: |
          sleep 20
          curl http://${{ secrets.EC2_HOST }}:5000 || exit 1